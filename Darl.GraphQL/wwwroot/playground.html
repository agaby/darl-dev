<!DOCTYPE html>
<html>
<head>
    <meta charset=utf-8 />
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, minimal-ui">
    <title>DARL GraphQL API Portal - Playground</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/graphql-playground-react/build/static/css/index.css" />
    <link rel="shortcut icon" href="//cdn.jsdelivr.net/npm/graphql-playground-react/build/favicon.png" />
    <script src="//cdn.jsdelivr.net/npm/graphql-playground-react/build/static/js/middleware.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />

</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3">
            <div class="container">
                <a class="navbar-brand" href="Index.html">
                    <img src="/images/logo.png" alt="">
                    GraphQL API
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target=".navbar-collapse" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse d-sm-inline-flex flex-sm-row-reverse">
                    <ul class="navbar-nav flex-grow-1">
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="Index.html">GraphiQL</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="voyager.html">Voyager</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="darleditor.html">DARL editor</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="https://darl.ai">DARL.AI</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="https://darl.ai/#pricing">Pricing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="/docs/">Docs</a>
                        </li>
                         <li class="nav-item">
                            <a class="btn btn-rounded btn-primary" href="">Login/Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <div id="root">
        <style>
            body {
                background-color: rgb(23,42,58);
                font-family: Open Sans,sans-serif;
                height: 90vh;
            }

            #root {
                height: 100%;
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .loading {
                font-size: 32px;
                font-weight: 200;
                color: rgba(255,255,255,.6);
                margin-left: 20px;
            }

            img {
                width: 78px;
                height: 78px;
            }

            .title {
                font-weight: 400;
            }
        </style>
        <img src='//cdn.jsdelivr.net/npm/graphql-playground-react/build/logo.png' alt=''>
        <div class="loading">
            Loading <span class="title">GraphQL Playground</span>
        </div>
    </div>
    <script>
        window.addEventListener('load', function (event) {
            GraphQLPlayground.init(document.getElementById('root'),
                {
                    setTitle: true,
                    endpoint: window.location.protocol + "//" + window.location.host + "/graphql",
                    subscriptionEndpoint: (window.location.protocol === "http:" ? "ws://" : "wss://") + window.location.host + "/graphql",
                    settings: { 'editor.theme': 'light', 'request.credentials': 'include'  }
                });
        })
    </script>
</body>
</html>
