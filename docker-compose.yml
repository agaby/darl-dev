version: '3.4'

services:
  darl.graphql:
    image: ${DOCKER_REGISTRY-}darlgraphql
    build:
      context: .
      dockerfile: Darl.GraphQL/Dockerfile
    restart: always
    environment:
      MONGOCONNECTION: mongodb://root:example@mongo:27017/
      MONGODATABASE: thinkbase
      SINGLEUSERID: 8c663676-a7dc-4561-af3d-89b38555837d
      BLOBFILEPATH: blobs

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
