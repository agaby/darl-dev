name: Create darl.ai nuget package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    
env:
  WORKING_DIRECTORY: "Darl.GraphQL/Darl.ai/Darl.ai"
  
jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 5.0.x
    - name: Restore dependencies
      run: dotnet restore "${{env.WORKING_DIRECTORY}}" --ignore-failed-sources
    - name: Build
      run: dotnet build "${{env.WORKING_DIRECTORY}}" --configuration Release --no-restore
    - name: pack
      run: dotnet pack "${{env.WORKING_DIRECTORY}}"  ==no-restore --no-build --configuration Release --include-symbols
    - name: push package
      run: dotnet nuget push "${{env.WORKING_DIRECTORY}}/*.nupkg"  --api-key ${{secrets.PAT}} --source "github" --no-restore --no-build
    - name: Write info to news Item
      id: hello
      uses: thinkbase-ai/newsitem_action@v1.14
      with:
        apiKey: ${{secrets.DARL_API_KEY}}
